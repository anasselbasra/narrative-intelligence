<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 110">
  <!--
    7 hollow diamonds · circle r=26, center (62,44) · gap at 225° (lower-left)
    Each diamond = 16×16 rect rotated 45° around its center, fill=none.
    Half-diagonal after rotation = 8√2 ≈ 11.3 → no overlap at r=26.
  -->

  <!-- 315° upper-left  — center (43.6, 25.6) -->
  <rect x="35.6" y="17.6" width="16" height="16"
        fill="none" stroke="#C8FF00" stroke-width="2.2"
        transform="rotate(45 43.6 25.6)"/>

  <!-- 0°   top          — center (62, 18) -->
  <rect x="54"   y="10"   width="16" height="16"
        fill="none" stroke="#AAFF00" stroke-width="2.2"
        transform="rotate(45 62 18)"/>

  <!-- 45°  upper-right  — center (80.4, 25.6) -->
  <rect x="72.4" y="17.6" width="16" height="16"
        fill="none" stroke="#88FF00" stroke-width="2.2"
        transform="rotate(45 80.4 25.6)"/>

  <!-- 90°  right        — center (88, 44) -->
  <rect x="80"   y="36"   width="16" height="16"
        fill="none" stroke="#66EE00" stroke-width="2.2"
        transform="rotate(45 88 44)"/>

  <!-- 135° lower-right  — center (80.4, 62.4) -->
  <rect x="72.4" y="54.4" width="16" height="16"
        fill="none" stroke="#44DD00" stroke-width="2.2"
        transform="rotate(45 80.4 62.4)"/>

  <!-- 180° bottom       — center (62, 70) -->
  <rect x="54"   y="62"   width="16" height="16"
        fill="none" stroke="#55CC00" stroke-width="2.2"
        transform="rotate(45 62 70)"/>

  <!-- 225° — GAP intentionnel -->

  <!-- 270° left         — center (36, 44) -->
  <rect x="28"   y="36"   width="16" height="16"
        fill="none" stroke="#99EE00" stroke-width="2.2"
        transform="rotate(45 36 44)"/>

  <!-- "opsci.ai" — blanc pour fonds sombres -->
  <text x="62" y="101"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="300" letter-spacing="2"
        fill="#ffffff">opsci.ai</text>
</svg>
