<svg viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg" width="560" height="210">
  <rect width="560" height="210" fill="#000000"/>

  <!-- Defs: glow filter for diamonds -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 7 hollow diamonds arranged in a circle -->
  <!-- center: (185, 105), radius: 62 -->
  <!-- Each diamond: rect 22x22, rotated 45deg, no fill, stroke -->

  <!-- i=0: top (185, 43) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#CCFF00" stroke-width="4.5"
        transform="translate(185,43) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=1: top-right (233.5, 66.3) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#BBFF00" stroke-width="4.5"
        transform="translate(233.5,66.3) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=2: right (245.5, 118.8) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#99FF00" stroke-width="4.5"
        transform="translate(245.5,118.8) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=3: bottom-right (211.9, 160.9) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#66FF22" stroke-width="4.5"
        transform="translate(211.9,160.9) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=4: bottom-left (158.1, 160.9) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#55FF33" stroke-width="4.5"
        transform="translate(158.1,160.9) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=5: left (124.5, 118.8) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#88FF00" stroke-width="4.5"
        transform="translate(124.5,118.8) rotate(45)"
        filter="url(#glow)"/>

  <!-- i=6: top-left (136.5, 66.3) -->
  <rect x="-11" y="-11" width="22" height="22"
        fill="none" stroke="#AAFF00" stroke-width="4.5"
        transform="translate(136.5,66.3) rotate(45)"
        filter="url(#glow)"/>

  <!-- ".ai" text -->
  <text
    x="305"
    y="158"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="72"
    font-weight="300"
    letter-spacing="2"
    fill="#444444">.ai</text>
</svg>
