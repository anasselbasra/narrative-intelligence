<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 110">
  <!--
    Opsci.ai logo — 7 hollow diamonds
    Circle: r=26, center (62, 44)
    Gap at 270° (left / 9 o'clock)
    Positions: 315°, 0°, 45°, 90°, 135°, 180°, 225°
    Each diamond: 16×16 rect rotated 45°, fill=none, thick stroke
  -->

  <!-- 315° upper-left  — (43.6, 25.6) — bright yellow -->
  <rect x="35.6" y="17.6" width="16" height="16"
        fill="none" stroke="#E0FF00" stroke-width="2.8"
        transform="rotate(45 43.6 25.6)"/>

  <!-- 0° top — (62, 18) — yellow-green -->
  <rect x="54" y="10" width="16" height="16"
        fill="none" stroke="#C0FF00" stroke-width="2.8"
        transform="rotate(45 62 18)"/>

  <!-- 45° upper-right — (80.4, 25.6) — green-yellow -->
  <rect x="72.4" y="17.6" width="16" height="16"
        fill="none" stroke="#88FF00" stroke-width="2.8"
        transform="rotate(45 80.4 25.6)"/>

  <!-- 90° right — (88, 44) — green -->
  <rect x="80" y="36" width="16" height="16"
        fill="none" stroke="#55EE00" stroke-width="2.8"
        transform="rotate(45 88 44)"/>

  <!-- 135° lower-right — (80.4, 62.4) — darker green -->
  <rect x="72.4" y="54.4" width="16" height="16"
        fill="none" stroke="#40DD00" stroke-width="2.8"
        transform="rotate(45 80.4 62.4)"/>

  <!-- 180° bottom — (62, 70) — olive-green -->
  <rect x="54" y="62" width="16" height="16"
        fill="none" stroke="#80CC00" stroke-width="2.8"
        transform="rotate(45 62 70)"/>

  <!-- 225° lower-left — (43.6, 62.4) — yellow-green -->
  <rect x="35.6" y="54.4" width="16" height="16"
        fill="none" stroke="#A0DD00" stroke-width="2.8"
        transform="rotate(45 43.6 62.4)"/>

  <!-- GAP at 270° (left / 9 o'clock) -->

  <text x="62" y="101"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="300" letter-spacing="2"
        fill="#ffffff">opsci.ai</text>
</svg>
